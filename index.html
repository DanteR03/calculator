<!DOCTYPE html>
<html lang="en">
<head>
  <title>Calculator</title>
  <link rel="stylesheet" href="calc.css">
  <script src="calc.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="display">123456789</div>
    <div class="button-container">
      <button>0</button>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>+</button>
      <button>-</button>
      <button>*</button>
      <button>/</button>
      <button>=</button>
      <button>Clear</button>
    </div>
  </div>
</body>

</html>
